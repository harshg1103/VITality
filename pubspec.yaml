name: vitality
description: VITality - Academic Collaboration and Social Discovery Network for VIT Pune.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  nearby_connections: ^4.0.0
  dart_jsonwebtoken: ^2.12.2
  appinio_swiper: ^2.0.0
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  uuid: ^4.4.0
  crypto: ^3.0.3
  flutter_animate: ^4.5.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
